openapi: 3.0.3
info:
  title: TaskNest API
  description: |
    RESTful API for TaskNest Phase 2 - Full-Stack Task Management Application

    ## Features
    - User authentication with JWT tokens
    - Complete task CRUD operations
    - Task priorities (High, Medium, Low)
    - Tags and categories
    - Search, filter, and sort
    - Due dates and times
    - Recurring tasks
    - Browser notifications

    ## Authentication
    All endpoints (except authentication endpoints) require a valid JWT token in the Authorization header:
    ```
    Authorization: Bearer <token>
    ```

    ## User Data Isolation
    All endpoints automatically filter data by the authenticated user. Users can only access their own data.

  version: 1.0.0
  contact:
    name: TaskNest API Support
    email: support@tasknest.example.com

servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
  - url: https://api.tasknest.example.com/api/v1
    description: Production server

tags:
  - name: Authentication
    description: User registration, login, and token management
  - name: Tasks
    description: Task CRUD operations, search, filter, and sort
  - name: Tags
    description: Tag management for task categorization

security:
  - BearerAuth: []

paths:
  # Authentication Endpoints
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: Authenticate user and receive JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Invalidate current JWT token
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh JWT token
      description: Get a new JWT token before expiration
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  # Task Endpoints
  /tasks:
    get:
      tags:
        - Tasks
      summary: List all tasks
      description: |
        Get all tasks for the authenticated user with optional filtering, searching, and sorting.

        **Filtering**: Combine multiple filters with AND logic
        **Searching**: Case-insensitive search in title and description
        **Sorting**: Specify field and direction
      parameters:
        - name: completed
          in: query
          description: Filter by completion status
          schema:
            type: string
            enum: [all, pending, completed]
            default: all
        - name: priority
          in: query
          description: Filter by priority level
          schema:
            type: string
            enum: [all, high, medium, low]
            default: all
        - name: tags
          in: query
          description: Filter by tag names (comma-separated for multiple)
          schema:
            type: string
            example: "Work,Urgent"
        - name: due_date_filter
          in: query
          description: Filter by due date range
          schema:
            type: string
            enum: [all, overdue, today, this_week, this_month, no_due_date]
            default: all
        - name: search
          in: query
          description: Search keyword in title and description
          schema:
            type: string
        - name: sort_by
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [created_at, due_date, priority, title]
            default: created_at
        - name: sort_order
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: limit
          in: query
          description: Maximum number of results
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          description: Number of results to skip (pagination)
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Tasks retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  total:
                    type: integer
                    description: Total number of tasks matching filters
                  limit:
                    type: integer
                  offset:
                    type: integer
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags:
        - Tasks
      summary: Create a new task
      description: Create a new task for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /tasks/{task_id}:
    get:
      tags:
        - Tasks
      summary: Get task by ID
      description: Retrieve a specific task by ID (must belong to authenticated user)
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags:
        - Tasks
      summary: Update task
      description: Update an existing task (must belong to authenticated user)
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Tasks
      summary: Delete task
      description: Delete a task (must belong to authenticated user)
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Task deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{task_id}/complete:
    patch:
      tags:
        - Tasks
      summary: Toggle task completion
      description: |
        Mark task as complete or incomplete.
        If task has recurrence pattern and is marked complete, automatically creates next occurrence.
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                completed:
                  type: boolean
              required:
                - completed
      responses:
        '200':
          description: Task completion status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  task:
                    $ref: '#/components/schemas/Task'
                  next_occurrence:
                    $ref: '#/components/schemas/Task'
                    nullable: true
                    description: Next occurrence if task is recurring
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # Tag Endpoints
  /tags:
    get:
      tags:
        - Tags
      summary: List all tags
      description: Get all tags for the authenticated user
      responses:
        '200':
          description: Tags retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags:
        - Tags
      summary: Create a new tag
      description: Create a new tag for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreate'
      responses:
        '201':
          description: Tag created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          description: Invalid input or tag name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /tags/{tag_id}:
    delete:
      tags:
        - Tags
      summary: Delete tag
      description: Delete a tag (removes from all tasks)
      parameters:
        - name: tag_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Tag deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Tag deleted successfully
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Tag not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login or /auth/register

  schemas:
    # Authentication Schemas
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: SecurePass123
        name:
          type: string
          maxLength: 255
          example: John Doe

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: SecurePass123

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Token expiration time in seconds
          example: 604800
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            name:
              type: string

    # Task Schemas
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: string
          example: user-uuid-123
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Buy groceries
        description:
          type: string
          maxLength: 1000
          nullable: true
          example: Milk, eggs, bread
        completed:
          type: boolean
          example: false
        priority:
          type: string
          enum: [high, medium, low]
          example: medium
        due_date:
          type: string
          format: date
          nullable: true
          example: "2026-02-05"
        due_time:
          type: string
          format: time
          nullable: true
          example: "15:00:00"
        recurrence_pattern:
          $ref: '#/components/schemas/RecurrencePattern'
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
        created_at:
          type: string
          format: date-time
          example: "2026-02-02T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-02-02T10:30:00Z"

    TaskCreate:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Buy groceries
        description:
          type: string
          maxLength: 1000
          nullable: true
          example: Milk, eggs, bread
        priority:
          type: string
          enum: [high, medium, low]
          default: medium
          example: high
        due_date:
          type: string
          format: date
          nullable: true
          example: "2026-02-05"
        due_time:
          type: string
          format: time
          nullable: true
          example: "15:00:00"
        recurrence_pattern:
          $ref: '#/components/schemas/RecurrencePattern'
          nullable: true
        tag_ids:
          type: array
          items:
            type: integer
          example: [1, 2, 3]

    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: Buy groceries and fruits
        description:
          type: string
          maxLength: 1000
          nullable: true
          example: Milk, eggs, bread, apples
        priority:
          type: string
          enum: [high, medium, low]
          example: high
        due_date:
          type: string
          format: date
          nullable: true
          example: "2026-02-05"
        due_time:
          type: string
          format: time
          nullable: true
          example: "15:00:00"
        recurrence_pattern:
          $ref: '#/components/schemas/RecurrencePattern'
          nullable: true
        tag_ids:
          type: array
          items:
            type: integer
          example: [1, 2, 3]

    RecurrencePattern:
      type: object
      required:
        - type
        - interval
      properties:
        type:
          type: string
          enum: [daily, weekly, monthly]
          example: weekly
        interval:
          type: integer
          minimum: 1
          example: 1
          description: Every N days/weeks/months
        days_of_week:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 7
          example: [1, 3, 5]
          description: For weekly recurrence (1=Monday, 7=Sunday)
        day_of_month:
          type: integer
          minimum: 1
          maximum: 31
          example: 15
          description: For monthly recurrence

    # Tag Schemas
    Tag:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: string
          example: user-uuid-123
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: Work
        created_at:
          type: string
          format: date-time
          example: "2026-02-02T10:30:00Z"

    TagCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: Work

    # Error Schemas
    Error:
      type: object
      properties:
        error:
          type: string
          example: Invalid credentials
        detail:
          type: string
          example: Email or password is incorrect

    ValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  type: string
                example: ["body", "email"]
              msg:
                type: string
                example: field required
              type:
                type: string
                example: value_error.missing

  responses:
    UnauthorizedError:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Unauthorized
            detail: Invalid or expired token
